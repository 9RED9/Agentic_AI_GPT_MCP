<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ReAct Agent 챗봇</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f0f2f5;
    display: flex; justify-content: center;
    height: 100vh; padding: 16px;
  }
  .chat-app {
    width: 100%; max-width: 720px;
    display: flex; flex-direction: column;
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
    overflow: hidden;
  }
  header {
    padding: 14px 20px; background: #1a2b4c; color: #fff;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  header .buttons { display: flex; gap: 8px; }
  header button {
    background: transparent; color: #cfd8ea;
    border: 1px solid #55688f; border-radius: 6px;
    padding: 5px 12px; font-size: 13px; cursor: pointer;
  }
  header button:hover { background: #2d4270; color: #fff; }

  #chat-log {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 14px; font-size: 14px;
    line-height: 1.55; white-space: pre-wrap; word-break: break-word;
  }
  .user {
    align-self: flex-end;
    background: #1a73e8; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bot {
    align-self: flex-start;
    background: #eceff3; color: #222;
    border-bottom-left-radius: 4px;
  }
  .bot.loading { color: #888; font-style: italic; }
  .summary {
    align-self: stretch; max-width: 100%;
    background: #fff8e1; color: #5d4400;
    border: 1px solid #f0d98c; border-radius: 10px;
  }
  .summary::before { content: "📋 대화 요약\A"; font-weight: 700; white-space: pre; }

  form {
    display: flex; gap: 8px;
    padding: 14px 16px; border-top: 1px solid #e3e6ea;
  }
  #msg-input {
    flex: 1; padding: 11px 14px; font-size: 14px;
    border: 1px solid #cfd4da; border-radius: 8px; outline: none;
  }
  #msg-input:focus { border-color: #1a73e8; }
  #send-btn {
    padding: 0 22px; font-size: 14px; font-weight: 600;
    background: #1a73e8; color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
  }
  #send-btn:disabled { background: #9db8dd; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="chat-app">
    <header>
      <h1>🤖 ReAct Agent 챗봇</h1>
      <div class="buttons">
        <button id="summary-btn" type="button">대화 내용 요약</button>
        <button id="reset-btn" type="button">대화 내용 초기화</button>
      </div>
    </header>

    <div id="chat-log">
      <div class="bubble bot">안녕하세요! 고객 DB 검색과 현재 기온 조회 도구를 사용할 수 있는 에이전트입니다. 예: "지금 서울 기온이 몇도인가요?"</div>
    </div>

    <form id="chat-form">
      <input id="msg-input" type="text" placeholder="질문을 입력하세요..." autocomplete="off" autofocus>
      <button id="send-btn" type="submit">전송</button>
    </form>
  </div>

<script>
  const chatLog = document.getElementById("chat-log");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const resetBtn = document.getElementById("reset-btn");
  const summaryBtn = document.getElementById("summary-btn");

  // 말풍선 하나를 채팅 로그에 추가하고 그 요소를 반환
  function addBubble(text, cls) {
    const div = document.createElement("div");
    div.className = "bubble " + cls;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;  // 항상 맨 아래로 스크롤
    return div;
  }

  // 폼 제출 -> POST /chat 호출 -> 답변 말풍선 표시
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addBubble(message, "user");
    input.value = "";
    sendBtn.disabled = true;

    // 응답 대기 중 표시
    const waiting = addBubble("답변 생성 중...", "bot loading");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });
      const data = await res.json();
      waiting.classList.remove("loading");
      waiting.textContent = data.reply || data.error || "응답이 없습니다.";
    } catch (err) {
      waiting.classList.remove("loading");
      waiting.textContent = "서버 요청에 실패했습니다: " + err;
    } finally {
      sendBtn.disabled = false;
      input.focus();
      chatLog.scrollTop = chatLog.scrollHeight;
    }
  });

  // 대화 초기화 -> POST /reset 호출 후 화면도 비움
  resetBtn.addEventListener("click", async () => {
    await fetch("/reset", { method: "POST" });
    chatLog.innerHTML = "";
    addBubble("대화가 초기화되었습니다. 새로운 질문을 해주세요!", "bot");
    input.focus();
  });

  // 대화 요약 -> POST /summary 호출 후 요약 말풍선 표시
  summaryBtn.addEventListener("click", async () => {
    summaryBtn.disabled = true;
    const waiting = addBubble("대화 내용을 요약하는 중...", "bot loading");
    try {
      const res = await fetch("/summary", { method: "POST" });
      const data = await res.json();
      waiting.remove();
      addBubble(data.summary || "요약할 대화가 없습니다.", "summary");
    } catch (err) {
      waiting.classList.remove("loading");
      waiting.textContent = "요약 요청에 실패했습니다: " + err;
    } finally {
      summaryBtn.disabled = false;
      chatLog.scrollTop = chatLog.scrollHeight;
    }
  });
</script>
</body>
</html>
