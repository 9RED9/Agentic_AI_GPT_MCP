<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multi-Server MCP 에이전트 (Streamable HTTP)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f0f2f5;
    display: flex; justify-content: center;
    height: 100vh; padding: 16px;
  }
  .chat-app {
    width: 100%; max-width: 760px;
    display: flex; flex-direction: column;
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.12);
    overflow: hidden;
  }
  header {
    padding: 14px 20px; background: #1a2b4c; color: #fff;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 17px; font-weight: 600; }
  header button {
    background: transparent; color: #cfd8ea;
    border: 1px solid #55688f; border-radius: 6px;
    padding: 5px 12px; font-size: 13px; cursor: pointer;
  }
  header button:hover { background: #2d4270; color: #fff; }

  /* ── 서버 설정 영역 (Streamlit 사이드바에 해당) ── */
  .server-bar {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    padding: 10px 16px; background: #f7f9fc; border-bottom: 1px solid #e3e6ea;
    font-size: 13px;
  }
  .server-bar input {
    flex: 1; min-width: 180px;
    padding: 7px 10px; font-size: 13px;
    border: 1px solid #cfd4da; border-radius: 6px; outline: none;
  }
  .server-bar input:focus { border-color: #1a73e8; }
  .badge {
    padding: 4px 10px; border-radius: 12px;
    font-size: 12.5px; font-weight: 600; white-space: nowrap;
  }
  .badge.active { background: #e2f4e5; color: #1c7a2d; }
  .badge.failed { background: #fde7e7; color: #b3261e; }

  #chat-log {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 14px; font-size: 14px;
    line-height: 1.55; white-space: pre-wrap; word-break: break-word;
  }
  .user {
    align-self: flex-end;
    background: #1a73e8; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bot {
    align-self: flex-start;
    background: #eceff3; color: #222;
    border-bottom-left-radius: 4px;
  }
  .bot.loading { color: #888; font-style: italic; }
  .tool {
    align-self: flex-start;
    background: #fff7e0; color: #7a5c00;
    border: 1px solid #f0e0a8;
    font-size: 12.5px; padding: 6px 12px;
  }

  form {
    display: flex; gap: 8px;
    padding: 14px 16px; border-top: 1px solid #e3e6ea;
  }
  #msg-input {
    flex: 1; padding: 11px 14px; font-size: 14px;
    border: 1px solid #cfd4da; border-radius: 8px; outline: none;
  }
  #msg-input:focus { border-color: #1a73e8; }
  #send-btn {
    padding: 0 22px; font-size: 14px; font-weight: 600;
    background: #1a73e8; color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
  }
  #send-btn:disabled { background: #9db8dd; cursor: not-allowed; }
</style>
</head>
<body>
  <div class="chat-app">
    <header>
      <h1>🔗 Multi-Server MCP 에이전트 (Streamable HTTP)</h1>
      <button id="reset-btn" type="button">대화 초기화</button>
    </header>

    <!-- 서버 URL 입력 + 상태 배지 (Streamlit 사이드바에 해당) -->
    <div class="server-bar">
      <input id="server-url-1" type="text" value="http://localhost:8000/mcp"
             placeholder="서버 1 URL" title="첫 번째 MCP 서버 URL">
      <input id="server-url-2" type="text" value=""
             placeholder="서버 2 URL (선택)" title="두 번째 MCP 서버 URL (비워두면 서버 1만 사용)">
      <span id="badge-active" class="badge active">활성 -</span>
      <span id="badge-failed" class="badge failed">실패 -</span>
    </div>

    <div id="chat-log">
      <div class="bubble bot">안녕하세요! 연결된 MCP 서버들의 도구(의류 가격, Chinook DB 등)를 활용해 답변합니다.
먼저 MCP 서버를 실행하세요: python mcp_local_server.py --http</div>
    </div>

    <form id="chat-form">
      <input id="msg-input" type="text" placeholder="질문을 입력하세요..." autocomplete="off" autofocus>
      <button id="send-btn" type="submit">전송</button>
    </form>
  </div>

<script>
  const chatLog = document.getElementById("chat-log");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const resetBtn = document.getElementById("reset-btn");
  const badgeActive = document.getElementById("badge-active");
  const badgeFailed = document.getElementById("badge-failed");

  // 말풍선 하나를 채팅 로그에 추가하고 그 요소를 반환
  function addBubble(text, cls) {
    const div = document.createElement("div");
    div.className = "bubble " + cls;
    div.textContent = text;
    chatLog.appendChild(div);
    chatLog.scrollTop = chatLog.scrollHeight;  // 항상 맨 아래로 스크롤
    return div;
  }

  // 입력된 서버 URL 목록 (빈 칸 제외)
  function getServerUrls() {
    return [
      document.getElementById("server-url-1").value.trim(),
      document.getElementById("server-url-2").value.trim(),
    ].filter(Boolean);
  }

  // 폼 제출 -> POST /chat 호출 -> 도구 사용 내역 + 답변 + 서버 상태 표시
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    const serverUrls = getServerUrls();
    if (serverUrls.length === 0) {
      addBubble("서버 URL을 최소 1개 입력해주세요.", "bot");
      return;
    }

    addBubble(message, "user");
    input.value = "";
    sendBtn.disabled = true;

    // 응답 대기 중 표시
    const waiting = addBubble("답변 생성 중...", "bot loading");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, server_urls: serverUrls }),
      });
      const data = await res.json();

      // 활성/실패 서버 수 배지 갱신 (Streamlit의 st.metric에 해당)
      if (data.active !== undefined) badgeActive.textContent = "활성 " + data.active;
      if (data.failed !== undefined) badgeFailed.textContent = "실패 " + data.failed;

      // 도구 사용 내역 표시 (Streamlit 버전의 st.toast에 해당)
      if (data.tool_calls && data.tool_calls.length > 0) {
        chatLog.insertBefore(
          Object.assign(document.createElement("div"), {
            className: "bubble tool",
            textContent: "🔧 도구 활용: " + data.tool_calls.join(", "),
          }),
          waiting
        );
      }

      waiting.classList.remove("loading");
      waiting.textContent = data.reply || data.error || "응답이 없습니다.";
    } catch (err) {
      waiting.classList.remove("loading");
      waiting.textContent = "서버 요청에 실패했습니다: " + err;
    } finally {
      sendBtn.disabled = false;
      input.focus();
      chatLog.scrollTop = chatLog.scrollHeight;
    }
  });

  // 대화 초기화 -> POST /reset 호출 후 화면도 비움
  resetBtn.addEventListener("click", async () => {
    await fetch("/reset", { method: "POST" });
    chatLog.innerHTML = "";
    addBubble("대화가 초기화되었습니다. 새로운 질문을 해주세요!", "bot");
    input.focus();
  });
</script>
</body>
</html>
